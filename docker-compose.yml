services:
  api:
    build: .
    env_file:
      - ${APP_ENV_FILE:-.env.local}
    environment:
      DATABASE_URL: postgresql+psycopg://ict:ict@db:5432/ict_integration_hub
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 5
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ict_integration_hub
      POSTGRES_USER: ict
      POSTGRES_PASSWORD: ict
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ict -d ict_integration_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
